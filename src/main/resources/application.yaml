server:
  servlet:
    context-path: /orders-processor

spring:
  application:
    name: orders-processor

  datasource:
    url: jdbc:postgresql://localhost:5432/retotecnico
    username: postgres
    password: postgres
    hikari:
      idle-timeout: 500
      minimum-idle: 5
      max-lifetime: 60000
      maximum-pool-size: 80

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

app:
  batch-process:
    batch-size: 10